services:
  postgres:
    image: postgres:16-alpine
    container_name: knowledge_assistant_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  chromadb:
    image: chromadb/chroma:latest
    container_name: knowledge_assistant_chromadb_prod
    restart: always
    volumes:
      - chroma_prod_data:/chroma/chroma
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge_assistant_backend_prod
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: postgres
      CHROMA_HOST: chromadb
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_prod_data:
  chroma_prod_data:

networks:
  internal:
    driver: bridge